<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login Seguro | FlexBox Trainer</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #08111d; color: #fff; font-family: sans-serif; }
    .box { text-align: center; background: #111723; padding: 40px; border-radius: 12px; border: 1px solid #2a3140; }
    p { color: #888; margin-bottom: 24px; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="box">
    <h2>Login via Google</h2>
    <p>Autentique-se de forma segura para continuar no VS Code.</p>
    
    <div id="g_id_onload"
         data-client_id="248632474679-8663hgsnun8q5ddq98cc2kf23u23844p.apps.googleusercontent.com"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false">
    </div>
    
    <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large"></div>
    <div id="status" style="margin-top: 15px; color: #4cba72;"></div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
