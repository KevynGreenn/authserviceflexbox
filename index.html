<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Seguro | FlexBox Trainer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="box">
    <h2>Login via Google</h2>
    <p>Depois do login, você será redirecionado de volta para o VS Code pela URL de callback informada pela extensão.</p>
    <div id="notice">Clique em entrar com Google para continuar.</div>

    <div id="g_id_onload"
         data-client_id="248632474679-8663hgsnun8q5ddq98cc2kf23u23844p.apps.googleusercontent.com"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large"></div>
    <div id="status" style="margin-top: 15px; color: #4cba72;"></div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
